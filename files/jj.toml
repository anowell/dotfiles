"$schema" = "https://jj-vcs.github.io/jj/latest/config-schema.json"

[user]
name = "Anthony Nowell"
email = "anthony@howie.ai"

[ui]
default-command = "l"

[aliases]
tug = ["bookmark", "move", "--from", "heads(::@- & bookmarks())", "--to", "@-"]
p = ["git", "push"]
pb = ["git", "push", "-r", "heads(::@- & bookmarks())"]
l = ["log", "-r", "ancestors(reachable(@, mutable()), 2)"]
ll = ["log", "-r", "ancestors(reachable(@, mutable()))"]
changes = ["log", "--no-graph", "--reversed", "--template", "change_id.short() ++ \"\n\""]
n = ["util", "exec", "--", "bash", "-c", """
set -euo pipefail
jj git fetch
jj new 'trunk()'
""", ""]
up = ["workspace", "update-stale"]
nt = ["new", "trunk()"]
credit = ["file", "annotate"]
me = ["log", "-r", "ancestors(reachable(@, mutable())) & me"]
lw = ["util", "exec", "--", "bash", "-c", """
jj log -r "ancestors(reachable(${1}@, mutable()), 2)"
""", ""]
ahead = ["util", "exec", "--", "bash", "-c", """
jj log -r "::@ ~ ::${1:-default@} ~ empty()"
""", ""]
 
[revset-aliases]
'user(x)' = 'author(x) | committer(x)'
'me' = 'user("anthony@howie.ai") | user("anowell@gmail.com")'
'ws(x)' = 'reachable(x, mutable())'
'ahead(x)' = '::@ ~ ::x ~ empty()'

[templates]
git_push_bookmark = '"anowell/" ++ change_id.short()'


[colors]
"diff removed token" = { bg = "#221111", underline = false }
"diff added token" = { bg = "#002200", underline = false }
